name: Deploy MultiDocker
on:
  push:
    branches:
      - main # check your repo, your default branch might be master!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: install the gcloud CLI
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: stately-forest-427607-k1
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: build and push docker images
        env:
          GOOGLE_PROJECT: stately-forest-427607-k1
        run: |
          gcloud auth configure-docker asia-south2-docker.pkg.dev
          docker build -t asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/client:latest -f ./client/Dockerfile ./client
          docker build -t asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/api:latest -f ./server/Dockerfile ./server
          docker build -t asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/worker:latest -f ./worker/Dockerfile ./worker
          docker build -t asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/nginx:latest -f ./nginx/Dockerfile ./nginx
          docker push asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/client:latest
          docker push asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/api:latest
          docker push asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/worker:latest
          docker push asia-south2-docker.pkg.dev/stately-forest-427607-k1/multi-container-docker/nginx:latest

